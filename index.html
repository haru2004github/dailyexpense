<!DOCTYPE html>
<html lang="my" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နေ့စဉ်သုံးငွေစာရင်း (Pro Dashboard)</title>
    
    <!-- Tailwind CSS with Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Padauk', 'sans-serif'] },
                    colors: {
                        primary: '#2563eb', // blue-600
                        primaryDark: '#1e40af', // blue-800
                    }
                }
            }
        }
    </script>
    
    <!-- Phosphor Icons & Chart.js -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions for charts and theme */
        canvas { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <!-- Main App Container -->
    <main class="max-w-2xl mx-auto min-h-screen bg-white dark:bg-slate-800 shadow-2xl relative flex flex-col transition-colors duration-300">
        
        <!-- Header Section -->
        <header class="bg-gradient-to-r from-blue-600 to-blue-700 dark:from-slate-800 dark:to-slate-900 text-white p-6 rounded-b-[2rem] shadow-lg z-10 relative">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm">
                        <i class="ph ph-wallet text-xl"></i>
                    </div>
                    <h1 class="text-lg font-bold tracking-wide">Expense Pro</h1>
                </div>
                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="p-2 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-sm transition-all border border-white/10">
                    <i id="theme-icon" class="ph ph-moon text-xl"></i>
                </button>
            </div>
            
            <!-- Key Metrics Grid -->
            <div class="grid grid-cols-1 gap-4">
                <div class="flex flex-col items-center">
                    <p class="text-blue-100 dark:text-slate-400 text-sm mb-1 font-medium">စုစုပေါင်း သုံးငွေ</p>
                    <h2 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">
                        <span id="total-amount">၀</span> <span class="text-xl md:text-2xl text-blue-200 dark:text-slate-500 font-normal">Ks</span>
                    </h2>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-2 border-t border-white/20 pt-4">
                    <div class="bg-white/10 dark:bg-slate-800/50 rounded-xl p-3 backdrop-blur-sm">
                        <p class="text-xs text-blue-100 dark:text-slate-400 mb-1 flex items-center gap-1">
                            <i class="ph ph-chart-line-up"></i> ပျမ်းမျှ/နေ့
                        </p>
                        <p class="text-lg font-bold"><span id="avg-amount">၀</span> <span class="text-xs font-normal opacity-70">Ks</span></p>
                    </div>
                    <div class="bg-white/10 dark:bg-slate-800/50 rounded-xl p-3 backdrop-blur-sm">
                        <p class="text-xs text-blue-100 dark:text-slate-400 mb-1 flex items-center gap-1">
                            <i class="ph ph-arrow-circle-up"></i> အများဆုံးသုံးငွေ
                        </p>
                        <p class="text-lg font-bold"><span id="max-amount">၀</span> <span class="text-xs font-normal opacity-70">Ks</span></p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Loader Overlay -->
        <div id="loader" class="absolute inset-0 bg-white/80 dark:bg-slate-800/80 z-[100] hidden flex-col items-center justify-center backdrop-blur-md">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin shadow-lg"></div>
            <p id="loader-text" class="mt-4 text-blue-800 dark:text-blue-400 font-bold tracking-wide">ဒေတာရယူနေပါသည်...</p>
        </div>

        <!-- Dashboard / Analytics Section -->
        <div class="px-5 pt-6 pb-2 space-y-5">
            
            <!-- Controls: Search & Export -->
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="search-input" onkeyup="applyFilters()" placeholder="အကြောင်းအရာရှာရန်..." 
                           class="w-full bg-gray-100 dark:bg-slate-700/50 border border-transparent dark:border-slate-600 text-gray-700 dark:text-gray-200 text-sm rounded-xl pl-10 pr-3 py-3 focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                </div>
                <button onclick="exportCSV()" class="bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400 px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-emerald-200 dark:hover:bg-emerald-500/30 transition-colors text-sm font-bold shadow-sm">
                    <i class="ph ph-download-simple text-lg"></i> <span class="hidden sm:inline">CSV</span>
                </button>
            </div>

            <!-- Filters -->
            <div class="flex gap-3">
                <div class="relative flex-1">
                    <i class="ph ph-calendar-blank absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 z-10 pointer-events-none"></i>
                    <select id="filter-time" onchange="applyFilters()" class="w-full bg-gray-100 dark:bg-slate-700/50 border border-transparent dark:border-slate-600 text-gray-700 dark:text-gray-200 text-sm rounded-xl pl-9 pr-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none cursor-pointer">
                        <option value="all">ကာလအားလုံး</option>
                        <option value="daily">ယနေ့</option>
                        <option value="weekly">ယခုအပတ်</option>
                        <option value="monthly">ယခုလ</option>
                        <option value="yearly">ယခုနှစ်</option>
                    </select>
                </div>
                <div class="relative flex-1">
                    <i class="ph ph-tag absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 z-10 pointer-events-none"></i>
                    <select id="filter-category" onchange="applyFilters()" class="w-full bg-gray-100 dark:bg-slate-700/50 border border-transparent dark:border-slate-600 text-gray-700 dark:text-gray-200 text-sm rounded-xl pl-9 pr-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none cursor-pointer">
                        <option value="all">အမျိုးအစားအားလုံး</option>
                        <option value="အစားအသောက်">အစားအသောက်</option>
                        <option value="သွားလာစရိတ်">သွားလာစရိတ်</option>
                        <option value="အင်တာနက်/ဖုန်း">အင်တာနက်/ဖုန်း</option>
                        <option value="ကျန်းမာရေး">ကျန်းမာရေး</option>
                        <option value="အထွေထွေ">အထွေထွေ</option>
                    </select>
                </div>
            </div>

            <!-- Charts Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Doughnut Chart Card -->
                <div class="bg-gray-50 dark:bg-slate-700/40 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-slate-700">
                    <h3 class="text-sm font-bold text-gray-600 dark:text-gray-300 mb-3 flex items-center gap-2"><i class="ph ph-pie-chart"></i> အချိုးအစား (Category)</h3>
                    <div class="relative h-48">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
                <!-- Line/Trend Chart Card -->
                <div class="bg-gray-50 dark:bg-slate-700/40 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-slate-700">
                    <h3 class="text-sm font-bold text-gray-600 dark:text-gray-300 mb-3 flex items-center gap-2"><i class="ph ph-trend-up"></i> အပြောင်းအလဲ (Trend)</h3>
                    <div class="relative h-48">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Expense List Section -->
        <div class="flex-1 overflow-y-auto no-scrollbar p-5 pb-24">
            <div class="flex justify-between items-end mb-4 border-b border-gray-100 dark:border-slate-700 pb-2">
                <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100">မှတ်တမ်းများ</h3>
                <span class="text-xs font-medium px-2 py-1 bg-blue-100 text-blue-700 dark:bg-slate-700 dark:text-blue-400 rounded-full">
                    <span id="record-count">၀</span> ခု
                </span>
            </div>
            
            <ul id="expense-list" class="space-y-3">
                <!-- Data will be injected here -->
            </ul>
            
            <!-- Empty State -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-10 text-center opacity-60">
                <div class="bg-gray-100 dark:bg-slate-700 p-4 rounded-full mb-4">
                    <i class="ph ph-receipt text-5xl text-gray-400 dark:text-gray-400"></i>
                </div>
                <p class="text-gray-500 dark:text-gray-400 text-sm">ဒေတာ မရှိသေးပါ (သို့)<br>ရှာဖွေမှုနှင့် ကိုက်ညီသော မှတ်တမ်းမရှိပါ။</p>
            </div>
        </div>

        <!-- Add/Edit Form (Modal/Bottom Sheet) -->
        <div id="form-container" class="absolute inset-0 bg-black/60 z-50 hidden flex-col justify-end transition-opacity backdrop-blur-sm">
            <div class="bg-white dark:bg-slate-800 rounded-t-[2rem] p-6 shadow-2xl animate-slide-up w-full max-w-2xl mx-auto transition-colors duration-300 border-t border-gray-200 dark:border-slate-600">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="form-title" class="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                        <i class="ph ph-note-pencil text-blue-600 dark:text-blue-400"></i> သုံးငွေမှတ်ရန်
                    </h3>
                    <button type="button" onclick="toggleForm()" class="p-2 bg-gray-100 dark:bg-slate-700 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors">
                        <i class="ph ph-x text-lg"></i>
                    </button>
                </div>
                
                <form id="expense-form" class="space-y-5">
                    <input type="hidden" id="expense-id">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">အကြောင်းအရာ</label>
                        <input type="text" id="desc" required placeholder="ဥပမာ - နေ့လည်စာ၊ ကော်ဖီ" 
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-gray-800 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all shadow-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">ပမာဏ (ကျပ်)</label>
                            <input type="number" id="amount" required min="1" placeholder="၅၀၀၀" 
                                   class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-gray-800 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all shadow-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">ရက်စွဲ</label>
                            <input type="date" id="date" required 
                                   class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-gray-800 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-sm shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">အမျိုးအစား</label>
                        <select id="category" required 
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-gray-800 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all appearance-none shadow-sm cursor-pointer">
                            <option value="အစားအသောက်">🍔 အစားအသောက်</option>
                            <option value="သွားလာစရိတ်">🚕 သွားလာစရိတ်</option>
                            <option value="အင်တာနက်/ဖုန်း">📱 အင်တာနက်/ဖုန်း</option>
                            <option value="ကျန်းမာရေး">💊 ကျန်းမာရေး</option>
                            <option value="အထွေထွေ">🛒 အထွေထွေ</option>
                        </select>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl mt-2 shadow-lg shadow-blue-500/30 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                        <i class="ph ph-check-circle text-xl"></i> အတည်ပြုမှတ်သားမည်
                    </button>
                </form>
            </div>
        </div>

        <!-- Floating Action Button (FAB) -->
        <button onclick="openAddForm()" class="absolute bottom-6 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-700 rounded-full text-white shadow-xl shadow-blue-500/40 flex items-center justify-center active:scale-90 transition-all z-40 border-2 border-white dark:border-slate-800">
            <i class="ph ph-plus text-2xl font-bold"></i>
        </button>

    </main>

    <script>
        // --- Configuration ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlkKvuJyGn3NaPc8CXaVTmJ9MY6kIK957f9m__xMAp1oDzjWJ_S1sI_CiwV6HKl1n5eA/exec';

        // --- System State ---
        let allExpenses = []; 
        let filteredExpenses = []; 
        let isEditing = false;
        let expenseChartInstance = null;
        let trendChartInstance = null; // New chart instance

        // --- Theme Management ---
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('ph-moon', 'ph-sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').classList.replace('ph-sun', 'ph-moon');
            }
        }
        
        function toggleTheme() {
            const htmlClasses = document.documentElement.classList;
            const themeIcon = document.getElementById('theme-icon');
            if (htmlClasses.contains('dark')) {
                htmlClasses.remove('dark');
                localStorage.theme = 'light';
                themeIcon.classList.replace('ph-sun', 'ph-moon');
            } else {
                htmlClasses.add('dark');
                localStorage.theme = 'dark';
                themeIcon.classList.replace('ph-moon', 'ph-sun');
            }
            // Update charts colors on theme switch
            if(expenseChartInstance) updateCharts(); 
        }
        initTheme();

        // --- DOM Elements ---
        const formContainer = document.getElementById('form-container');
        const form = document.getElementById('expense-form');
        const expenseList = document.getElementById('expense-list');
        const emptyState = document.getElementById('empty-state');
        const recordCount = document.getElementById('record-count');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        
        // Metrics
        const totalAmountEl = document.getElementById('total-amount');
        const avgAmountEl = document.getElementById('avg-amount');
        const maxAmountEl = document.getElementById('max-amount');

        // Form & Filters
        const idInput = document.getElementById('expense-id');
        const descInput = document.getElementById('desc');
        const amountInput = document.getElementById('amount');
        const dateInput = document.getElementById('date');
        const categoryInput = document.getElementById('category');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const filterTime = document.getElementById('filter-time');
        const filterCategory = document.getElementById('filter-category');
        const searchInput = document.getElementById('search-input');

        // --- Helper & Utility Functions ---
        function toggleLoader(show, text = 'လုပ်ဆောင်နေပါသည်...') {
            loaderText.textContent = text;
            if (show) { loader.classList.remove('hidden'); loader.classList.add('flex'); } 
            else { loader.classList.add('hidden'); loader.classList.remove('flex'); }
        }

        function toggleForm() {
            if (formContainer.classList.contains('hidden')) {
                formContainer.classList.remove('hidden', 'opacity-0');
                formContainer.classList.add('flex', 'opacity-100');
            } else {
                formContainer.classList.add('hidden', 'opacity-0');
                formContainer.classList.remove('flex', 'opacity-100');
            }
        }

        function openAddForm() {
            isEditing = false;
            form.reset();
            dateInput.valueAsDate = new Date(); 
            idInput.value = '';
            formTitle.innerHTML = `<i class="ph ph-note-pencil text-blue-600 dark:text-blue-400"></i> သုံးငွေမှတ်ရန်`;
            submitBtn.innerHTML = `<i class="ph ph-check-circle text-xl"></i> အတည်ပြုမှတ်သားမည်`;
            toggleForm();
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US').format(amount);
        }

        function getCategoryStyle(category) {
            const styles = {
                'အစားအသောက်': { icon: 'ph-hamburger', color: 'bg-orange-100 text-orange-600 dark:bg-orange-500/20 dark:text-orange-400', hex: '#f97316' },
                'သွားလာစရိတ်': { icon: 'ph-taxi', color: 'bg-blue-100 text-blue-600 dark:bg-blue-500/20 dark:text-blue-400', hex: '#3b82f6' },
                'အင်တာနက်/ဖုန်း': { icon: 'ph-device-mobile', color: 'bg-purple-100 text-purple-600 dark:bg-purple-500/20 dark:text-purple-400', hex: '#a855f7' },
                'ကျန်းမာရေး': { icon: 'ph-pill', color: 'bg-red-100 text-red-600 dark:bg-red-500/20 dark:text-red-400', hex: '#ef4444' },
                'အထွေထွေ': { icon: 'ph-shopping-cart', color: 'bg-gray-100 text-gray-600 dark:bg-gray-500/20 dark:text-gray-400', hex: '#6b7280' }
            };
            return styles[category] || { icon: 'ph-receipt', color: 'bg-gray-100 text-gray-600 dark:bg-slate-600 dark:text-gray-300', hex: '#9ca3af' };
        }

        // --- Data Fetching & Syncing ---
        async function fetchExpenses() {
            if (!SCRIPT_URL) return alert("Apps Script URL လိုအပ်ပါသည်။");
            toggleLoader(true, "ဒေတာများ ရယူနေပါသည်...");
            try {
                const response = await fetch(SCRIPT_URL);
                allExpenses = await response.json();
                applyFilters(); 
            } catch (error) {
                console.error("Error fetching data:", error);
            } finally {
                toggleLoader(false);
            }
        }

        async function syncToSheet(action, payload) {
            toggleLoader(true, "သိမ်းဆည်းနေပါသည်...");
            const formData = new FormData();
            formData.append('action', action);
            if (payload) for (let key in payload) formData.append(key, payload[key]);

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.status === 'success') await fetchExpenses(); 
                else alert("သိမ်းဆည်းရာတွင် အမှားအယွင်းဖြစ်သွားပါသည်။");
            } catch (error) {
                console.error("Error syncing data:", error);
                alert("ချိတ်ဆက်မှု ပြတ်တောက်သွားပါသည်။ ပြန်လည်ကြိုးစားကြည့်ပါ။");
            } finally {
                toggleLoader(false);
            }
        }

        // --- Advanced Filtering Logic ---
        function applyFilters() {
            const timeFilter = filterTime.value;
            const catFilter = filterCategory.value;
            const searchTerm = searchInput.value.toLowerCase().trim();
            const today = new Date();
            
            filteredExpenses = allExpenses.filter(exp => {
                const expDate = new Date(exp.date);
                let timeMatch = true;
                let catMatch = catFilter === 'all' || exp.category === catFilter;
                let searchMatch = !searchTerm || exp.desc.toLowerCase().includes(searchTerm);

                if (timeFilter === 'daily') {
                    timeMatch = expDate.toDateString() === today.toDateString();
                } else if (timeFilter === 'weekly') {
                    const pastWeek = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 7);
                    timeMatch = expDate >= pastWeek && expDate <= today;
                } else if (timeFilter === 'monthly') {
                    timeMatch = expDate.getMonth() === today.getMonth() && expDate.getFullYear() === today.getFullYear();
                } else if (timeFilter === 'yearly') {
                    timeMatch = expDate.getFullYear() === today.getFullYear();
                }

                return timeMatch && catMatch && searchMatch;
            });

            // Sort newest first
            filteredExpenses.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            renderExpenses();
            updateMetrics();
            updateCharts();
        }

        // --- Metrics Calculation ---
        function updateMetrics() {
            let total = 0;
            let max = 0;
            const uniqueDates = new Set();

            filteredExpenses.forEach(exp => {
                const amt = Number(exp.amount);
                total += amt;
                if (amt > max) max = amt;
                // Normalize date string for counting unique days
                const d = new Date(exp.date);
                uniqueDates.add(d.toDateString());
            });

            const daysCount = uniqueDates.size || 1; // Avoid divide by zero
            const avg = total / daysCount;

            totalAmountEl.textContent = formatCurrency(total);
            maxAmountEl.textContent = formatCurrency(max);
            avgAmountEl.textContent = formatCurrency(Math.round(avg));
        }

        // --- Export to CSV ---
        function exportCSV() {
            if (!filteredExpenses.length) return alert("ထုတ်ယူရန် ဒေတာမရှိပါ။");
            
            // UTF-8 BOM to ensure Excel opens Burmese characters correctly
            const bom = "\uFEFF"; 
            const headers = "ရက်စွဲ,အကြောင်းအရာ,အမျိုးအစား,ပမာဏ(Ks)\n";
            const csvRows = filteredExpenses.map(e => {
                const cleanDesc = e.desc.replace(/"/g, '""'); // Escape quotes
                const dateStr = new Date(e.date).toLocaleDateString('en-GB');
                return `${dateStr},"${cleanDesc}",${e.category},${e.amount}`;
            });
            
            const csv = bom + headers + csvRows.join("\n");
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = `Expense_Pro_Report_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // --- Render UI ---
        function renderExpenses() {
            expenseList.innerHTML = '';

            if (filteredExpenses.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');

                filteredExpenses.forEach(expense => {
                    const style = getCategoryStyle(expense.category);
                    const displayDate = new Date(expense.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });

                    const li = document.createElement('li');
                    li.className = "bg-white dark:bg-slate-700/60 p-4 rounded-2xl border border-gray-100 dark:border-slate-600 shadow-sm flex items-center justify-between transition-transform hover:scale-[1.01]";
                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl ${style.color}">
                                <i class="ph ${style.icon}"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-800 dark:text-gray-100 text-[15px]">${expense.desc}</h4>
                                <div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 mt-0.5">
                                    <span class="bg-gray-100 dark:bg-slate-600 px-2 py-0.5 rounded-md">${expense.category}</span>
                                    <span>•</span>
                                    <span>${displayDate}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="font-bold text-gray-800 dark:text-white">${formatCurrency(expense.amount)} Ks</span>
                            <div class="flex gap-2">
                                <button onclick="editExpense('${expense.id}')" class="p-1.5 text-blue-500 dark:text-blue-400 bg-blue-50 dark:bg-slate-800 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900 transition-colors">
                                    <i class="ph ph-pencil-simple"></i>
                                </button>
                                <button onclick="deleteExpense('${expense.id}')" class="p-1.5 text-red-500 dark:text-red-400 bg-red-50 dark:bg-slate-800 rounded-lg hover:bg-red-100 dark:hover:bg-red-900 transition-colors">
                                    <i class="ph ph-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    expenseList.appendChild(li);
                });
            }

            recordCount.textContent = formatCurrency(filteredExpenses.length);
        }

        // --- Chart.js Integration ---
        function updateCharts() {
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#64748b'; // slate-400 / slate-500
            const gridColor = isDark ? '#334155' : '#f1f5f9'; // slate-700 / slate-100

            // 1. Prepare Doughnut Data (Category)
            const categoryData = {};
            filteredExpenses.forEach(exp => {
                categoryData[exp.category] = (categoryData[exp.category] || 0) + Number(exp.amount);
            });
            const dLabels = Object.keys(categoryData);
            const dData = Object.values(categoryData);
            const dColors = dLabels.map(label => getCategoryStyle(label).hex);

            // 2. Prepare Line Data (Trend)
            const trendDataMap = {};
            // Sort expenses by date ascending for the line chart
            [...filteredExpenses].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(exp => {
                const dateKey = new Date(exp.date).toLocaleDateString('en-GB', {day: '2-digit', month: 'short'});
                trendDataMap[dateKey] = (trendDataMap[dateKey] || 0) + Number(exp.amount);
            });
            const tLabels = Object.keys(trendDataMap);
            const tData = Object.values(trendDataMap);

            // Destroy existing charts
            if (expenseChartInstance) expenseChartInstance.destroy();
            if (trendChartInstance) trendChartInstance.destroy();

            // Render Doughnut
            const ctxDoughnut = document.getElementById('expenseChart').getContext('2d');
            expenseChartInstance = new Chart(ctxDoughnut, {
                type: 'doughnut',
                data: {
                    labels: dLabels.length ? dLabels : ['မရှိသေးပါ'],
                    datasets: [{
                        data: dData.length ? dData : [1],
                        backgroundColor: dData.length ? dColors : [isDark ? '#334155' : '#e2e8f0'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: textColor, font: { family: 'Padauk', size: 11 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    if(!dData.length) return ' ဒေတာမရှိပါ';
                                    return ` ${ctx.label}: ${formatCurrency(ctx.parsed)} Ks`;
                                }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });

            // Render Line Chart
            const ctxLine = document.getElementById('trendChart').getContext('2d');
            trendChartInstance = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: tLabels.length ? tLabels : ['-'],
                    datasets: [{
                        label: 'သုံးငွေပမာဏ',
                        data: tData.length ? tData : [0],
                        borderColor: '#2563eb', // blue-600
                        backgroundColor: isDark ? 'rgba(37, 99, 235, 0.1)' : 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#2563eb',
                        pointRadius: 3,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false }, ticks: { color: textColor, font: {size: 10} } },
                        y: { grid: { color: gridColor }, ticks: { color: textColor, font: {size: 10},
                            callback: function(val) { return val >= 1000 ? (val/1000) + 'K' : val; }
                        } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) { return ` ${formatCurrency(ctx.parsed.y)} Ks`; }
                            }
                        }
                    }
                }
            });
        }

        // --- Form Event Listeners ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const expenseData = {
                id: isEditing ? idInput.value : Date.now().toString(),
                desc: descInput.value,
                amount: amountInput.value,
                date: dateInput.value,
                category: categoryInput.value
            };
            toggleForm();
            await syncToSheet(isEditing ? 'update' : 'create', expenseData);
        });

        function editExpense(id) {
            const expense = allExpenses.find(exp => exp.id === id);
            if (!expense) return;

            isEditing = true;
            idInput.value = expense.id;
            descInput.value = expense.desc;
            amountInput.value = expense.amount;
            
            let dateVal = expense.date;
            if(dateVal && dateVal.includes('T')) dateVal = dateVal.split('T')[0];
            dateInput.value = dateVal;
            categoryInput.value = expense.category;

            formTitle.innerHTML = `<i class="ph ph-note-pencil text-blue-600 dark:text-blue-400"></i> ပြင်ဆင်မည်`;
            submitBtn.innerHTML = `<i class="ph ph-check-circle text-xl"></i> အတည်ပြုပြင်ဆင်မည်`;
            toggleForm();
        }

        async function deleteExpense(id) {
            if (confirm("ဒီမှတ်တမ်းကို ဖျက်မှာ သေချာပြီလား? ဖျက်လိုက်ပါက ပြန်ယူ၍မရနိုင်ပါ။")) {
                await syncToSheet('delete', { id: id });
            }
        }

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', fetchExpenses);

    </script>
</body>
</html>
